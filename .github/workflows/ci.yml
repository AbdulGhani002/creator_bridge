name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MONGODB_URL: mongodb://localhost:27017
      DATABASE_NAME: creator_bridge
      CREATOR_BRIDGE_BASE_URL: http://localhost:8000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Seed database
        run: python backend/seed_data.py

      - name: Start API server
        run: |
          python -m uvicorn backend.main:app --host 127.0.0.1 --port 8000 &
          python - <<'PY'
          import time
          import requests

          for _ in range(30):
              try:
                  response = requests.get("http://localhost:8000/health", timeout=2)
                  if response.status_code == 200:
                      print("Backend is up")
                      break
              except Exception:
                  pass
              time.sleep(1)
          else:
              raise SystemExit("Backend failed to start")
          PY

      - name: Run startup test
        run: python test_startup.py

      - name: Run API tests
        run: python test_api.py

      - name: Run advanced API tests
        run: python advanced_api_test.py

  frontend-compile:
    name: Frontend Compile
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Swift package
        working-directory: frontend
        run: swift build
