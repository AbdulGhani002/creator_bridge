name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0' # Update to your desired version
          channel: 'stable'

      - name: Install dependencies
        run: |
          cd creator_bridge_flutter
          flutter pub get

      - name: Build iOS
        run: |
          cd creator_bridge_flutter
          flutter build ios --release --no-codesign
