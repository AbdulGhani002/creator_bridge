<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Campaign - Brand Portal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5048e5",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121121",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="max-w-2xl mx-auto min-h-screen flex flex-col bg-white dark:bg-slate-900 shadow-sm">
<div class="flex items-center p-4 border-b border-slate-200 dark:border-slate-800 justify-between">
<button class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center mr-10">Create Campaign</h2>
</div>
<div class="flex flex-col flex-1 p-6">
<div class="flex w-full flex-row items-center justify-center gap-4 py-6">
<div class="flex flex-col items-center gap-2">
<div class="h-10 w-10 rounded-full bg-primary flex items-center justify-center text-white font-bold">1</div>
<span class="text-xs font-semibold text-primary">Details</span>
</div>
<div class="h-px w-12 bg-primary"></div>
<div class="flex flex-col items-center gap-2">
<div class="h-10 w-10 rounded-full border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 flex items-center justify-center text-slate-400 font-bold">2</div>
<span class="text-xs font-medium text-slate-400">Budget</span>
</div>
<div class="h-px w-12 bg-slate-200 dark:bg-slate-700"></div>
<div class="flex flex-col items-center gap-2">
<div class="h-10 w-10 rounded-full border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 flex items-center justify-center text-slate-400 font-bold">3</div>
<span class="text-xs font-medium text-slate-400">Review</span>
</div>
</div>
<div class="space-y-8 mt-4">
<header>
<h3 class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-tight">Campaign Information</h3>
<p class="text-slate-500 dark:text-slate-400 mt-1">Fill in the basic details for your upcoming influencer campaign.</p>
</header>
<div class="space-y-6">
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Campaign Title
<input class="form-input flex w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-12 placeholder:text-slate-400" placeholder="e.g., Promote Luxury Villas" type="text"/>
</label></div>
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Requirements
<textarea class="form-input flex w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary min-h-[120px] placeholder:text-slate-400 p-3" placeholder="Dubai-based, Real Estate niche, 50k+ followers..."></textarea>
</label></div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Budget per Video ($)
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">$</span>
<input class="form-input flex w-full pl-8 rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-12 placeholder:text-slate-400" placeholder="200" type="number"/>
</div>
</label></div>
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Application Deadline
<div class="relative">
<span class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 material-symbols-outlined">calendar_today</span>
<input class="form-input flex w-full pr-10 rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-12" type="date"/>
</div>
</label></div>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Campaign Banner (Optional)
<div class="border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-xl p-8 flex flex-col items-center justify-center gap-2 hover:bg-slate-50 dark:hover:bg-slate-800/50 cursor-pointer transition-colors">
<span class="material-symbols-outlined text-3xl text-primary">cloud_upload</span>
<p class="text-sm text-slate-600 dark:text-slate-400">Click to upload or drag and drop</p>
<p class="text-xs text-slate-400">PNG, JPG or WEBP (max. 5MB)</p>
</div>
</label></div>
</div>
</div>
</div>
<div class="p-6 border-t border-slate-200 dark:border-slate-800 flex gap-4 bg-white dark:bg-slate-900 sticky bottom-0">
<button class="flex-1 px-6 py-3 rounded-lg border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 font-semibold hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                Save Draft
            </button>
<button class="flex-1 px-6 py-3 rounded-lg bg-primary text-white font-semibold hover:bg-primary/90 transition-all shadow-md shadow-primary/20">
                Next Step
            </button>
</div>
</div>
</body></html>
