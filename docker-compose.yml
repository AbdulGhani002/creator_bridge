version: '3.8'

services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    ports:
      - "8003:8003"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DATABASE_NAME=creator_bridge
      - ENV=production
      - SECRET_KEY=your-production-secret-key-change-this
    depends_on:
      - mongodb

volumes:
  mongodb_data:
